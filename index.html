<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JP Times — 발행 기사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#d32f2f;--navy:#0d1b3e;--bg:#f4f4f4;--text:#111;--muted:#666;--border:#e0e0e0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}

.util-bar{background:var(--navy);color:#8899bb;font-size:11px;padding:5px 20px;display:flex;justify-content:space-between}
header{background:#fff;border-bottom:3px solid var(--red);padding:14px 20px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-family:'Noto Serif KR',serif;font-size:36px;font-weight:900;color:var(--navy);letter-spacing:-1px;line-height:1;cursor:pointer;display:inline-block}
.logo:hover em{text-decoration:underline}
.logo em{color:var(--red);font-style:normal}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:.06em}
.logo-sub-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:3px}
.onair-btn{display:none;background:#fff;border:1px solid var(--red);color:var(--red);border-radius:999px;padding:3px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s}
.onair-btn:hover,.onair-btn.active{background:#fbe9e7}
.onair-btn .short{display:none}
@media(max-width:760px){.onair-btn{display:inline-block}.cat-tab.onair-tab{display:none}}

.cat-nav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cat-nav-inner{max-width:1200px;margin:0 auto;display:flex;overflow-x:auto}
.cat-tab{padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.cat-tab:hover{color:var(--text)}
.cat-tab.active{color:var(--red);border-bottom-color:var(--red)}
.cat-cnt{font-size:10px;background:#eee;color:var(--muted);padding:1px 6px;border-radius:10px;font-weight:700}
.cat-tab.active .cat-cnt{background:var(--red);color:#fff}

.page-wrap{max-width:1200px;margin:0 auto;padding:0 20px 48px}
.section-bar{margin:16px 0 12px;display:flex;align-items:center;gap:10px}
.section-title{font-size:15px;font-weight:900;color:var(--navy);border-left:4px solid var(--red);padding-left:10px}
.section-count{font-size:11px;color:var(--muted)}
.section-line{flex:1;height:1px;background:var(--border)}

/* 메인 + 사이드 */
.top-grid{display:grid;grid-template-columns:1fr 320px;gap:24px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.main-art{cursor:pointer}
.main-art:hover .main-title{color:var(--red)}
.main-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;border-radius:2px;background:#e8e8e8}
.main-img-ph{width:100%;aspect-ratio:16/9;background:#e8eaf6;border-radius:2px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:32px}
.main-badges{display:flex;gap:6px;margin:10px 0 6px;align-items:center;flex-wrap:wrap}
.main-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:900;line-height:1.4;color:var(--text);margin-bottom:8px;transition:color .15s}
.main-body{font-size:13px;color:var(--muted);line-height:1.8;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.main-date{font-size:11px;color:#aaa;margin-top:8px}

.side-list{border-left:1px solid var(--border);padding-left:20px;display:flex;flex-direction:column}
.side-item{display:grid;grid-template-columns:80px 1fr;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.side-item:first-child{padding-top:0}
.side-item:last-child{border-bottom:none}
.side-item:hover .side-title{color:var(--red)}
.side-thumb{width:80px;aspect-ratio:4/3;object-fit:cover;border-radius:2px;display:block;background:#e8e8e8}
.side-thumb-ph{width:80px;aspect-ratio:4/3;background:#e8eaf6;border-radius:2px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:16px}
.side-title{font-size:13px;font-weight:700;line-height:1.4;color:var(--text);margin-bottom:5px;transition:color .15s;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.side-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.side-date{font-size:10px;color:#aaa}

/* 그리드 */
.grid-wrap{margin-bottom:24px;border-top:2px solid var(--red)}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr)}
@media(max-width:760px){.grid-3{grid-template-columns:1fr}.top-grid{grid-template-columns:1fr}.side-list{border-left:none;padding-left:0}}
.grid-item{padding:16px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);cursor:pointer;background:#fff}
.grid-item:nth-child(3n){border-right:none}
.grid-item:hover .grid-title{color:var(--red)}
.grid-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;border-radius:2px;margin-bottom:8px;background:#e8e8e8}
.grid-img-ph{width:100%;aspect-ratio:16/9;background:#e8eaf6;border-radius:2px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:20px}
.grid-badges{display:flex;gap:5px;margin-bottom:6px;flex-wrap:wrap;align-items:center}
.grid-title{font-size:14px;font-weight:700;line-height:1.45;color:var(--text);margin-bottom:5px;transition:color .15s;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.grid-body{font-size:12px;color:var(--muted);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.grid-date{font-size:10px;color:#aaa;margin-top:6px}

/* 레벨 뱃지 */
.mbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;letter-spacing:.04em}
.b-kinder{background:#fff3e0;color:#bf360c}
.b-kids{background:#e8f5e9;color:#1b5e20}
.b-junior{background:#e3f2fd;color:#0d47a1}
.b-times{background:#f3e5f5;color:#4a148c}
.b-junior_m{background:#e0f2f1;color:#00695c}
.lvbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;background:#eceff1;color:#546e7a}

/* 기사 모달 */
.article-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px}
.article-overlay.show{display:flex}
.article-modal{background:#fff;border-radius:8px;width:100%;max-width:820px;margin:auto;overflow:hidden;position:relative;box-shadow:0 12px 48px rgba(0,0,0,.25)}
.article-modal-close{position:absolute;top:14px;right:16px;background:rgba(0,0,0,.5);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
.article-modal-close:hover{background:var(--red)}
.article-header{padding:24px 28px 16px;border-bottom:1px solid var(--border)}
.article-badges{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.article-title{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:900;line-height:1.4;color:var(--navy);margin-bottom:6px}
.article-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.article-hero{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.article-text-col{padding:24px 28px 32px}
.article-body{font-size:15px;line-height:2;color:var(--text);white-space:pre-line}
.ko-toggle{margin-top:18px;background:none;border:1px solid var(--border);border-radius:3px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--muted)}
.ko-toggle:hover{border-color:var(--red);color:var(--red)}
.ko-body{display:none;margin-top:14px;padding:16px;background:#fafafa;border-radius:6px;font-size:13px;line-height:1.9;white-space:pre-line;color:#333}
.ko-body.show{display:block}
.ko-summary{font-weight:700;color:var(--navy);margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed var(--border)}
.vocab{color:var(--muted);font-size:13px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--border);line-height:2}
.vocab b{color:var(--red)}

/* On Air 바이라인 */
.byline{display:flex;align-items:center;gap:14px;margin:14px 0 4px;padding:10px 0;border-top:1px solid var(--border)}
.byline-avatar{width:96px;height:96px;border-radius:50%;object-fit:cover;background:#e8eaf6;flex:0 0 auto}
.byline-info{display:flex;flex-direction:column;gap:4px}
.byline-name{font-size:15px;font-weight:900;color:var(--navy)}
.byline-name small{font-weight:400;color:var(--muted);font-size:12px;margin-right:2px}
.byline-team{font-size:11px;color:var(--muted)}
.card-avatar{width:18px;height:18px;border-radius:50%;object-fit:cover;flex:0 0 auto;background:#e8eaf6}
@media(max-width:760px){.byline-avatar{width:64px;height:64px}.byline{gap:10px}}

/* On Air 필진 프로필 */
.onair-tab{margin-left:auto;color:var(--red)!important;font-weight:900}
.onair-tab.active{border-bottom-color:var(--red)}
.profile-hero{text-align:center;padding:28px 12px 8px}
.profile-hero .ph-logo{font-family:'Noto Serif KR',serif;font-size:26px;font-weight:900;color:var(--navy)}
.profile-hero .ph-logo em{color:var(--red);font-style:normal}
.profile-hero .ph-sub{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.7}
.profile-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:20px 0 34px}
.profile-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:24px 16px 18px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;transition:outline-color .3s}
.profile-card.hl{outline:3px solid var(--red);outline-offset:2px}
.profile-order{font-size:10px;color:#bbb;letter-spacing:.08em}
.profile-avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;background:#e8eaf6}
.profile-loop{width:100%;max-width:280px;height:auto;border-radius:10px;background:#e8eaf6;display:block}
.profile-name{font-weight:900;font-size:17px;color:var(--navy)}
.profile-intro{font-size:12.5px;color:var(--muted);line-height:1.8;text-align:left}
.profile-btn{margin-top:auto;background:none;border:1px solid var(--red);color:var(--red);border-radius:3px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.profile-btn:hover{background:var(--red);color:#fff}
.byline-click{display:flex;align-items:center;gap:14px;cursor:pointer}
.tts-btn{margin-left:auto;background:#fff;border:1px solid var(--navy);color:var(--navy);border-radius:999px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s,color .15s}
.tts-btn:hover{background:var(--navy);color:#fff}
.tts-btn.playing{background:var(--red);border-color:var(--red);color:#fff}
.article-body p{margin:0 0 1.1em;white-space:pre-line}
.article-body p.speaking{background:#fff8e1;box-shadow:0 0 0 6px #fff8e1;border-radius:2px}
.byline-click:hover .byline-name{color:var(--red)}
@media(max-width:760px){.profile-grid{grid-template-columns:1fr}}

.state-box{padding:60px 20px;text-align:center}
.state-icon{font-size:44px;margin-bottom:12px;opacity:.3}
.state-title{font-size:18px;font-weight:700;color:var(--muted);margin-bottom:6px}
.state-msg{font-size:13px;color:#aaa;line-height:1.8}
.spinner{width:28px;height:28px;border:3px solid #ddd;border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

footer{background:var(--navy);color:#8899bb;font-size:11px;text-align:center;padding:20px}
</style>
</head>
<body>

<div class="util-bar">
  <span id="today"></span>
  <span>JP Times Content Pipeline — Published Articles</span>
</div>

<header>
  <div class="header-inner">
    <div style="flex:1">
      <div class="logo" onclick="goHome()" title="메인으로">JP <em>Times</em></div>
      <div class="logo-sub-row">
        <div class="logo-sub">ENGLISH EDUCATION NEWSPAPER · 발행 기사 모음</div>
        <button class="onair-btn" id="onair-btn" onclick="showProfiles(undefined,'header')">🔴 <span class="full">On Air 필진</span><span class="short">필진</span></button>
      </div>
    </div>
  </div>
</header>

<nav class="cat-nav">
  <div class="cat-nav-inner" id="cat-tabs"></div>
</nav>

<div class="page-wrap" id="content">
  <div class="state-box">
    <div class="spinner"></div>
    <div class="state-msg">발행된 기사를 불러오는 중...</div>
  </div>
</div>

<!-- 기사 모달 -->
<div class="article-overlay" id="article-overlay" onclick="if(event.target===this)closeArticle()">
  <div class="article-modal">
    <button class="article-modal-close" onclick="closeArticle()">✕</button>
    <div id="article-content"></div>
  </div>
</div>

<footer>© JP Times Content Pipeline · Powered by Claude</footer>

<script>
// ────────────────────────────────────────────────
// 설정: 파이프라인 서버 주소 (Railway v5)
const API_BASE = "https://web-production-0763d.up.railway.app";
// ────────────────────────────────────────────────

const LEVELS = [
  { key: "all",      label: "전체" },
  { key: "kinder",   label: "Kinder" },
  { key: "kids",     label: "Kids" },
  { key: "junior",   label: "Junior" },
  { key: "times",    label: "Times" },
  { key: "junior_m", label: "Junior M" },
];

// On Air 필자 — 시트 필자 필드(byline) 우선, 없으면(구버전 행) 발행물 매핑 폴백.
// 캐릭터 IP 단일 소스: news-pipeline5/docs/on_air_bible.md (BYLINE_AUTHORS와 동일 매핑)
const AVATAR_BASE = "assets/avatars/";
const bylineAuthors = { kinder: "Leo", kids: "Ruby", junior: "Sunny", junior_m: "Erin", times: "Daniel" };

// GA4 커스텀 이벤트 — SPA라 기사 열람이 페이지뷰로 안 잡히는 문제 보완.
// gtag 미로드 환경(로컬 파일 열기 등)에서도 에러 없이 무시되도록 가드.
function track(name, params) {
  if (typeof gtag === "function") {
    try { gtag("event", name, params); } catch (e) { /* 계측 실패는 무시 */ }
  }
}

// TTS — Web Speech API (서버·비용 없음). 캐릭터별 pitch/rate 프리셋.
// 보이스 자체는 기기별 가용 en-US 중 선택 — 기기 편차는 이번 단계의 알려진 한계.
const voicePresets = {
  Leo:    { rate: 0.85, pitch: 1.4  },  // 아이 목소리 근사
  Ruby:   { rate: 0.95, pitch: 1.25 },
  Sunny:  { rate: 1.05, pitch: 1.15 },  // 에너지
  Erin:   { rate: 0.95, pitch: 1.0  },
  Daniel: { rate: 0.9,  pitch: 0.85 },  // 앵커 톤
};

let _tts = { playing: false, articleIdx: null, lastPara: null, cancelled: false };
let _enVoice = null;
let _audioEl = null;  // 클라우드 MP3 재생용 (발행 시 사전 생성된 캐릭터 보이스)

function ttsSupported() {
  return typeof window !== "undefined" && "speechSynthesis" in window
      && typeof SpeechSynthesisUtterance !== "undefined";
}
function pickVoice() {
  if (!ttsSupported()) return;
  const vs = speechSynthesis.getVoices() || [];
  _enVoice = vs.find(v => v.lang === "en-US") || vs.find(v => (v.lang || "").startsWith("en")) || null;
}
if (ttsSupported()) {
  pickVoice();
  // getVoices()는 비동기 로드라 초기 빈 배열일 수 있음 — voiceschanged 대응
  try { speechSynthesis.addEventListener("voiceschanged", pickVoice); } catch (e) {}
}

function _josa(name) { return /[aeiouy]$/i.test(name || "") ? "가" : "이"; }

function stopTTS() {
  _tts.cancelled = true;
  _tts.playing = false;
  if (_audioEl) {
    try { _audioEl.pause(); _audioEl.removeAttribute("src"); _audioEl.load(); } catch (e) {}
  }
  if (ttsSupported()) {
    try { speechSynthesis.cancel(); } catch (e) {}
  }
  if (_tts.lastPara) { _tts.lastPara.classList.remove("speaking"); _tts.lastPara = null; }
  const btn = document.getElementById("tts-btn");
  if (btn && _tts.label) { btn.textContent = _tts.label; btn.classList.remove("playing"); }
}

function playCloudTTS(idx, a) {
  // 발행 시 사전 생성된 캐릭터 보이스 MP3 — 문단 하이라이트는 불가, 버튼 상태로 재생 중 표시
  const name = bylineOf(a);
  const st = { playing: true, articleIdx: idx, lastPara: null, cancelled: false, label: null };
  _tts = st;
  const btn = document.getElementById("tts-btn");
  if (btn) { st.label = btn.textContent; btn.textContent = "⏹ 정지"; btn.classList.add("playing"); }
  if (!_audioEl) _audioEl = new Audio();
  _audioEl.src = API_BASE + a.audio_url;
  _audioEl.onended = () => {
    if (st.cancelled || _tts !== st) return;
    track("tts_complete", { byline: name, level: a.level, article_title: titleOf(a), tts_source: "cloud" });
    stopTTS();
  };
  _audioEl.onerror = () => {
    if (st.cancelled || _tts !== st) return;
    stopTTS();  // 로드/재생 실패 — 버튼만 복원, 에러 노출 없음
  };
  track("tts_play", { byline: name, level: a.level, article_title: titleOf(a), tts_source: "cloud" });
  // iOS: 사용자 클릭 핸들러 체인 안에서 play() 직접 호출
  const p = _audioEl.play();
  if (p && p.catch) p.catch(() => { if (_tts === st) stopTTS(); });
}

function toggleTTS(idx) {
  // iOS Safari: 사용자 터치 핸들러 안에서 speak()/play()가 직접 호출돼야 재생됨 — 이 함수가 onclick
  if (_tts.playing) { stopTTS(); return; }
  const a = _articles[idx];
  if (!a) return;
  if (a.audio_url) { playCloudTTS(idx, a); return; }  // 클라우드 오디오 우선
  if (!ttsSupported()) return;  // 구기사(오디오 없음)는 Web Speech 폴백
  pickVoice();
  const vs = speechSynthesis.getVoices() || [];
  if (vs.length === 0 && !_enVoice) {
    const btn = document.getElementById("tts-btn");
    if (btn) btn.style.display = "none";  // 보이스 0개 — 버튼 숨김, 에러 노출 금지
    return;
  }
  const name = bylineOf(a);
  const preset = voicePresets[name] || { rate: 1.0, pitch: 1.0 };
  const paras = [titleOf(a)].concat(
    (a.article.text || "").split(/\n\s*\n/).map(s => s.trim()).filter(Boolean)
  );
  const st = { playing: true, articleIdx: idx, lastPara: null, cancelled: false, label: null };
  _tts = st;
  const btn = document.getElementById("tts-btn");
  if (btn) { st.label = btn.textContent; btn.textContent = "⏹ 정지"; btn.classList.add("playing"); }
  track("tts_play", { byline: name, level: a.level, article_title: titleOf(a), tts_source: "browser" });

  paras.forEach((text, i) => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    if (_enVoice) u.voice = _enVoice;
    u.rate = preset.rate;
    u.pitch = preset.pitch;
    u.onstart = () => {
      if (st.cancelled || _tts !== st) return;  // 이전 세션의 지연 이벤트 무시
      if (st.lastPara) st.lastPara.classList.remove("speaking");
      const p = i > 0 ? document.getElementById("tts-para-" + (i - 1)) : null;  // 0=제목
      if (p) { p.classList.add("speaking"); st.lastPara = p; }
    };
    if (i === paras.length - 1) {
      u.onend = () => {
        if (st.cancelled || _tts !== st) return;  // cancel()·세션 교체로 인한 onend는 완청 아님
        track("tts_complete", { byline: name, level: a.level, article_title: titleOf(a), tts_source: "browser" });
        stopTTS();
      };
    }
    speechSynthesis.speak(u);  // 문단 단위 분할 — 긴 단일 utterance 끊김 회피
  });
}

function bylineOf(a) {
  return (a.byline || "").trim() || bylineAuthors[a.level] || "";
}
function avatarUrl(name, lg) {
  return name ? `${AVATAR_BASE}${name.toLowerCase().replace(/\s+/g, "")}${lg ? "_lg" : ""}.webp` : "";
}
function cardAvatar(a) {
  const name = bylineOf(a);
  return name ? `<img class="card-avatar" src="${avatarUrl(name)}" alt="${esc(name)}" loading="lazy" onerror="this.remove()">` : "";
}
// 프로필 세로 루프 영상 — avatarUrl과 같은 이름 규칙(소문자), 원형 아바타 로직과 독립.
// loop 플래그가 있는 캐릭터만 렌더링(파일 있음이 데이터로 보장됨).
function loopVideo(c) {
  if (!c.loop) return "";
  const base = AVATAR_BASE + c.name.toLowerCase().replace(/\s+/g, "") + "-loop-540";
  return `<video class="profile-loop" autoplay muted loop playsinline
    poster="${avatarUrl(c.name, true)}">
    <source src="${base}.webm" type="video/webm">
    <source src="${base}.mp4" type="video/mp4">
  </video>`;
}

// On Air 필진 프로필 — 소개문은 news-pipeline5/docs/on_air_bible.md 3.6이 단일 소스
const characterProfiles = [
  { name: "Leo",    level: "kinder",   intro: "On Air의 막내 기자 레오예요. 이제 막 뉴스를 배우기 시작해서 궁금한 게 세상에서 제일 많아요. 동물과 탈것, 그리고 맛있는 간식 이야기가 나오면 눈이 반짝반짝해진답니다." },
  { name: "Ruby",   level: "kids",     intro: "신기한 걸 발견하면 제일 먼저 달려와 알려주는 주니어 리포터 루비예요. 과학 실험과 세계 여러 나라 친구들 이야기를 좋아해요. 아는 건 자랑이 아니라 나누는 거라고 믿어요." },
  { name: "Sunny",  level: "junior",   intro: "뉴스가 있는 곳이라면 어디든 달려가는 현장 리포터 써니예요. 스튜디오보다 현장이 좋아요. 스포츠, 환경, 요즘 유행하는 것들을 발로 뛰며 취재합니다." },
  { name: "Erin",   level: "junior_m", intro: "On Air의 신입 저널리스트 에린이에요. 뉴스가 여러분의 삶과 어떻게 이어지는지 보여주는 게 제 일이에요. 어느 한쪽으로 치우치지 않는 균형 잡힌 시선을 약속합니다." },
  { name: "Daniel", level: "times",    loop: true, intro: "On Air의 메인 앵커 대니얼입니다. 세계의 소식을 차분하고 정확하게 전하는 것, 그것이 뉴스룸의 선장인 제 역할입니다. 레오와 루비가 자라 앉게 될 자리를 지키고 있습니다." },
];

let _articles = [];
let _activeTab = "all";
let _view = "list";  // "list" | "profiles"

function bylineClick(level, name) {
  track("byline_click", { byline: name });
  closeArticle();
  showProfiles(level, "byline");
}

function goHome() {
  closeArticle();
  _view = "list";
  _activeTab = "all";
  renderTabs();
  renderList();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showProfiles(focusLevel, entryPoint) {
  track("profile_view", { entry_point: entryPoint || "tab" });
  _view = "profiles";
  renderTabs();
  renderProfiles(focusLevel);
}

function renderProfiles(focusLevel) {
  const el = document.getElementById("content");
  el.innerHTML = `
    <div class="profile-hero">
      <div class="ph-logo">ON <em>AIR</em> — 다섯 명의 뉴스룸</div>
      <div class="ph-sub">막내 기자부터 메인 앵커까지, 독자가 자라면 바이라인의 얼굴도 함께 자랍니다</div>
    </div>
    <div class="profile-grid">
      ${characterProfiles.map((c, i) => `
        <div class="profile-card ${focusLevel === c.level ? "hl" : ""}" id="profile-${c.level}">
          <div class="profile-order">${i + 1} / ${characterProfiles.length}</div>
          <img class="profile-avatar" src="${avatarUrl(c.name, true)}" alt="${esc(c.name)}" onerror="this.remove()">
          ${loopVideo(c)}
          <div class="profile-name">${esc(c.name)}</div>
          ${badge(c.level)}
          <div class="profile-intro">${esc(c.intro)}</div>
          <button class="profile-btn" onclick="switchTab('${c.level}')">이 필진의 기사 보기 →</button>
        </div>`).join("")}
    </div>`;
  if (focusLevel) {
    const card = document.getElementById("profile-" + focusLevel);
    if (card && card.scrollIntoView) card.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

document.getElementById("today").textContent =
  new Date().toLocaleDateString("ko-KR", { year:"numeric", month:"long", day:"numeric", weekday:"long" });

function esc(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function badge(level) {
  return `<span class="mbadge b-${esc(level)}">${esc(level.toUpperCase().replace("_", " "))}</span>`;
}

function imgOrPh(url, cls, phCls, icon) {
  return url
    ? `<img class="${cls}" src="${esc(url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;${phCls}&quot;>${icon}</div>'">`
    : `<div class="${phCls}">${icon}</div>`;
}

// 기사 제목: 본문 첫 문장 사용 (토픽이 한국어면 본문에서 추출)
function titleOf(a) {
  // 신기사: 파이프라인이 분리 생성한 제목. 구기사(제목 없음): 첫 문장 폴백
  const t = ((a.article || {}).title || "").trim();
  if (t) return t;
  const firstSentence = (a.article.text || "").split(/(?<=[.!?])\s/)[0] || a.topic;
  return firstSentence.length > 90 ? a.topic : firstSentence;
}

function renderTabs() {
  const hb = document.getElementById("onair-btn");
  if (hb) hb.classList.toggle("active", _view === "profiles");
  const counts = { all: _articles.length };
  for (const lv of ["kinder","kids","junior","times","junior_m"]) {
    counts[lv] = _articles.filter(a => a.level === lv).length;
  }
  document.getElementById("cat-tabs").innerHTML = LEVELS.map(t => `
    <div class="cat-tab ${_view === "list" && t.key === _activeTab ? "active" : ""}" onclick="switchTab('${t.key}')">
      ${t.label} <span class="cat-cnt">${counts[t.key] || 0}</span>
    </div>`).join("") + `
    <div class="cat-tab onair-tab ${_view === "profiles" ? "active" : ""}" onclick="showProfiles(undefined,'tab')">🔴 On Air 필진</div>`;
}

function switchTab(key) {
  _view = "list";
  _activeTab = key;
  renderTabs();
  renderList();
}

function renderList() {
  const el = document.getElementById("content");
  const list = _activeTab === "all" ? _articles : _articles.filter(a => a.level === _activeTab);

  if (list.length === 0) {
    el.innerHTML = `
      <div class="state-box">
        <div class="state-icon">📰</div>
        <div class="state-title">발행된 기사가 없습니다</div>
        <div class="state-msg">파이프라인에서 기사를 생성하고 '발행하기'를 누르면<br>이곳에 표시됩니다.</div>
      </div>`;
    return;
  }

  const [main, ...rest] = list;
  const side = rest.slice(0, 4);
  const grid = rest.slice(4);

  let html = `
    <div class="section-bar">
      <div class="section-title">${_activeTab === "all" ? "최신 발행 기사" : "JP Times " + (LEVELS.find(t => t.key === _activeTab) || { label: _activeTab }).label}</div>
      <div class="section-count">${list.length}건</div>
      <div class="section-line"></div>
    </div>

    <div class="top-grid">
      <div class="main-art" onclick="openArticle(${_articles.indexOf(main)})">
        ${imgOrPh(main.image_url, "main-img", "main-img-ph", "📰")}
        <div class="main-badges">${cardAvatar(main)}${badge(main.level)}<span class="lvbadge">${esc(main.section)}</span></div>
        <div class="main-title">${esc(titleOf(main))}</div>
        <div class="main-body">${esc(main.article.summary_ko || main.article.text)}</div>
        <div class="main-date">${esc(main.created_at)}</div>
      </div>
      <div class="side-list">
        ${side.map(a => `
          <div class="side-item" onclick="openArticle(${_articles.indexOf(a)})">
            ${imgOrPh(a.image_url, "side-thumb", "side-thumb-ph", "📰")}
            <div>
              <div class="side-title">${esc(titleOf(a))}</div>
              <div class="side-badges">${cardAvatar(a)}${badge(a.level)}<span class="side-date">${esc(a.created_at)}</span></div>
            </div>
          </div>`).join("")}
      </div>
    </div>`;

  if (grid.length > 0) {
    html += `
      <div class="grid-wrap">
        <div class="grid-3">
          ${grid.map(a => `
            <div class="grid-item" onclick="openArticle(${_articles.indexOf(a)})">
              ${imgOrPh(a.image_url, "grid-img", "grid-img-ph", "📰")}
              <div class="grid-badges">${cardAvatar(a)}${badge(a.level)}<span class="lvbadge">${esc(a.section)}</span></div>
              <div class="grid-title">${esc(titleOf(a))}</div>
              <div class="grid-body">${esc(a.article.summary_ko || a.article.text)}</div>
              <div class="grid-date">${esc(a.created_at)}</div>
            </div>`).join("")}
        </div>
      </div>`;
  }

  el.innerHTML = html;
}

function openArticle(idx) {
  const a = _articles[idx];
  if (!a) return;
  stopTTS();  // 다른 기사 열 때 이전 음성 정지
  track("article_view", {
    article_title: titleOf(a),
    level: a.level,
    sub_level: a.sub_level || "",
    byline: bylineOf(a),
    category: a.section,
  });
  document.getElementById("article-content").innerHTML = `
    ${a.image_url ? `<img class="article-hero" src="${esc(a.image_url)}" alt="">` : ""}
    <div class="article-header">
      <div class="article-badges">${badge(a.level)}<span class="lvbadge">${esc(a.section)}</span></div>
      <div class="article-title">${esc(titleOf(a))}</div>
      ${(() => {
        const name = bylineOf(a);   // 기사 객체 기준 매 렌더 계산 — 라우팅 잔존 없음
        if (!name) return "";
        return `<div class="byline">
          <div class="byline-click" onclick="bylineClick('${a.level}','${esc(name)}')" title="필진 프로필 보기">
            <img class="byline-avatar" src="${avatarUrl(name, true)}" alt="${esc(name)}" onerror="this.remove()">
            <div class="byline-info">
              <div class="byline-name"><small>By</small> ${esc(name)}</div>
              <div class="byline-team">On Air 뉴스룸</div>
            </div>
          </div>
          ${badge(a.level)}
          ${(a.audio_url || ttsSupported()) ? `<button class="tts-btn" id="tts-btn" onclick="toggleTTS(${idx})">🔊 ${esc(name)}${_josa(name)} 읽어주기</button>` : ""}
        </div>`;
      })()}
      <div class="article-meta">
        <span>📅 ${esc(a.created_at)}</span>
        <span>📝 ${a.article.word_count} words</span>
        <span>🏷️ ${esc(a.topic)}</span>
      </div>
    </div>
    <div class="article-text-col">
      <div class="article-body">${(a.article.text || "").split(/\n\s*\n/).map(s => s.trim()).filter(Boolean).map((p, i) => `<p id="tts-para-${i}">${esc(p)}</p>`).join("")}</div>
      <button class="ko-toggle" onclick="document.getElementById('ko-body').classList.toggle('show')">🇰🇷 한국어 번역 보기 / 닫기</button>
      <div class="ko-body" id="ko-body">
        ${a.article.summary_ko ? `<div class="ko-summary">요약 — ${esc(a.article.summary_ko)}</div>` : ""}
        ${esc(a.article.text_ko || "번역 없음")}
      </div>
      ${a.article.vocabulary && a.article.vocabulary.length ? `
        <div class="vocab"><b>Vocabulary</b> — ${a.article.vocabulary.map(esc).join(" · ")}</div>` : ""}
    </div>`;
  document.getElementById("article-overlay").classList.add("show");
  document.body.style.overflow = "hidden";
}

function closeArticle() {
  stopTTS();  // SPA — 이전 기사 음성이 계속 나오는 사고 방지
  document.getElementById("article-overlay").classList.remove("show");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeArticle(); });

async function load() {
  try {
    const res = await fetch(API_BASE + "/api/published");
    if (!res.ok) throw new Error("HTTP " + res.status);
    _articles = (await res.json()).reverse(); // 최신순
    renderTabs();
    renderList();
  } catch (e) {
    document.getElementById("content").innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-title">기사를 불러오지 못했습니다</div>
        <div class="state-msg">파이프라인 서버에 연결할 수 없습니다.<br>${esc(e.message)}</div>
      </div>`;
    renderTabs();
  }
}

load();
</script>
</body>
</html>
